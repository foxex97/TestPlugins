name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@v3
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds
          cp build/plugins.json $GITHUB_WORKSPACE/builds

     name: Build Plugins
  run: |
    cd $GITHUB_WORKSPACE/src
    chmod +x gradlew
    ./gradlew make makePluginsJson
    echo "=== Searching for .cs3 files ==="
    find . -name "*.cs3"
    echo "=== Searching for plugins.json ==="
    find . -name "plugins.json"
    echo "=== Copying files ==="
    find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
    find . -name "plugins.json" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
    echo "=== Builds folder contents ==="
    ls -la $GITHUB_WORKSPACE/builds/
